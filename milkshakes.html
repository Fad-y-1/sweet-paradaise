<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="imegs/logo/ChatGPT Image May 31, 2026, 05_15_40 PM.png">
    <title>Sweet Paradise - Premium Milkshakes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* أنيميشن دخول الصفحة الناعم */
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #fcf8f2; 
            color: #2b1810; 
            overflow-x: hidden;
            animation: fadeInPage 0.6s ease-in-out forwards;
        }

        @keyframes fadeInPage {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* زر الرجوع الاحترافي */
        .back-btn { 
            position: fixed; 
            top: 25px; 
            right: 30px; 
            background: #2b1810; 
            color: #fcf8f2; 
            padding: 12px 24px; 
            text-decoration: none; 
            border-radius: 25px; 
            z-index: 1000; 
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            border: 2px solid #c58940;
            box-shadow: 0 4px 15px rgba(43, 24, 16, 0.2);
            transition: all 0.4s ease;
        }
        .back-btn:hover { 
            background: #c58940; 
            color: #2b1810; 
            transform: scale(1.05);
        }

        .main-wrapper { display: flex; height: 100vh; }

        /* الجانب الأيسر: الصورة الجديدة الخاصة بك */
        .image-side { 
            width: 42%; 
            background: url('https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=800&q=80') center center/cover; 
            position: relative;
            border-right: 6px solid #2b1810;
        }
        
        /* شعار Sweet Paradise الصغير على الصورة ليماثل التصميم */
        .image-brand {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #fcf8f2;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            line-height: 1.1;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
        }

        /* الجانب الأيمن: محاكاة كاملة للمنيو المرفق */
        .menu-side { 
            width: 58%; 
            padding: 60px 8%; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            background-color: #fcf8f2;
        }

        /* تنسيق الهيدر (العنوان والخطوط الجانبية) */
        .menu-header { text-align: center; margin-top: 20px; }
        .main-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 48px; 
            font-weight: 900; 
            color: #2b1810; 
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .subtitle-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }
        .subtitle-wrapper::before, .subtitle-wrapper::after {
            content: "";
            display: block;
            width: 60px;
            height: 2px;
            background-color: #2b1810;
            opacity: 0.6;
        }
        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #2b1810;
        }

        /* بادج التصنيف (MILKSHAKES) */
        .category-badge {
            background-color: #c58940;
            color: #fcf8f2;
            display: inline-block;
            padding: 6px 30px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            box-shadow: 0 4px 10px rgba(197, 137, 64, 0.2);
        }

        /* قائمة العناصر والأسعار والـ Dots */
        .items-container { width: 100%; }
        .item-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: baseline; 
            margin-bottom: 28px; 
        }
        .item-name { 
            font-family: 'Playfair Display', serif;
            font-weight: 700; 
            font-size: 24px; 
            color: #2b1810;
        }
        .item-dots { 
            flex-grow: 1; 
            border-bottom: 3px dotted rgba(197, 137, 64, 0.5); 
            margin: 0 15px; 
            position: relative; 
            top: -5px; 
        }
        .item-price { 
            font-family: 'Poppins', sans-serif;
            font-weight: 700; 
            font-size: 24px; 
            color: #2b1810;
        }

        /* الفوتر السفلي للمنيو */
        .menu-footer {
            border-top: 1px dashed rgba(197, 137, 64, 0.4);
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #2b1810;
            font-weight: 600;
            opacity: 0.8;
        }
        .menu-footer i { color: #c58940; margin-right: 5px; }

        /* التجاوب مع الشاشات الصغيرة (الموبايل) */
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .image-side { width: 100%; height: 280px; border-right: none; border-bottom: 6px solid #2b1810; }
            .menu-side { width: 100%; padding: 40px 20px 20px; }
            .main-title { font-size: 36px; }
            .subtitle { font-size: 26px; }
            .item-name, .item-price { font-size: 19px; }
            .back-btn { top: 15px; right: 15px; padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <a href="index.html?openMenu=true" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Main</a>

    <div class="main-wrapper">
        <div class="image-side">
            <div class="image-brand">SWEET<br>PARADISE</div>
        </div>
        
        <div class="menu-side">
            <div style="width: 100%; text-align: center;">
                <div class="menu-header">
                    <h1 class="main-title">SWEET PARADISE</h1>
                    <div class="subtitle-wrapper">
                        <div class="subtitle">MENU</div>
                    </div>
                </div>
                
                <div class="category-badge">MILKSHAKES</div>
                
                <div class="items-container">
                    <div class="item-row"><span class="item-name">Chocolate Milkshake</span><span class="item-dots"></span><span class="item-price">75 EGP</span></div>
                    <div class="item-row"><span class="item-name">Vanilla Milkshake</span><span class="item-dots"></span><span class="item-price">75 EGP</span></div>
                    <div class="item-row"><span class="item-name">Oreo Milkshake</span><span class="item-dots"></span><span class="item-price">80 EGP</span></div>
                    <div class="item-row"><span class="item-name">Lotus Milkshake</span><span class="item-dots"></span><span class="item-price">80 EGP</span></div>
                    <div class="item-row"><span class="item-name">Kinder Milkshake</span><span class="item-dots"></span><span class="item-price">90 EGP</span></div>
                    <div class="item-row"><span class="item-name">Fruits Milkshake (Mango/Strawberry)</span><span class="item-dots"></span><span class="item-price">70 EGP</span></div>
                </div>
            </div>

            <div class="menu-footer">
                <span><i class="fa-regular fa-clock"></i> Available 07:00 - 11:00</span>
                <span><i class="fa-solid fa-globe"></i> More information: www.sweet-paradise.com</span>
            </div>
        </div>
    </div>

    <script>
        const subpageTranslations = {
            en: {
                back: '<i class="fa-solid fa-arrow-left"></i> Back to Main',
                badge: "MILKSHAKES",
                items: [
                    "Chocolate Milkshake", 
                    "Vanilla Milkshake", 
                    "Oreo Milkshake", 
                    "Lotus Milkshake", 
                    "Kinder Milkshake", 
                    "Fruits Milkshake (Mango/Strawberry)"
                ],
                footer1: '<i class="fa-regular fa-clock"></i> Available 07:00 - 11:00',
                footer2: '<i class="fa-solid fa-globe"></i> More information: www.sweet-paradise.com'
            },
            it: {
                back: '<i class="fa-solid fa-arrow-left"></i> Torna alla Home',
                badge: "MILKSHAKE PREMIUM",
                items: [
                    "Milkshake al Cioccolato", 
                    "Milkshake alla Vaniglia", 
                    "Milkshake Oreo", 
                    "Milkshake Lotus", 
                    "Milkshake Kinder", 
                    "Milkshake alla Frutta (Mango/Fragola)"
                ],
                footer1: '<i class="fa-regular fa-clock"></i> Disponibile 07:00 - 11:00',
                footer2: '<i class="fa-solid fa-globe"></i> Maggiori informazioni: www.sweet-paradise.com'
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            const currentLang = localStorage.getItem('selectedLang') || 'en';
            document.documentElement.lang = currentLang;
            const data = subpageTranslations[currentLang];
            
            document.querySelector('.back-btn').innerHTML = data.back;
            document.querySelector('.category-badge').innerText = data.badge;
            
            const itemElements = document.querySelectorAll('.item-name');
            itemElements.forEach((el, index) => {
                if(data.items[index]) el.innerText = data.items[index];
            });
            
            const footerSpans = document.querySelectorAll('.menu-footer span');
            if(footerSpans[0]) footerSpans[0].innerHTML = data.footer1;
            if(footerSpans[1]) footerSpans[1].innerHTML = data.footer2;

            const links = document.querySelectorAll("a");
            links.forEach(link => {
                link.addEventListener("click", function(e) {
                    const href = this.getAttribute("href");
                    if (href && href.includes(".html")) {
                        e.preventDefault();
                        document.body.style.transition = "0.4s ease-in-out";
                        document.body.style.opacity = "0";
                        setTimeout(() => { window.location.href = href; }, 400);
                    }
                });
            });
        });
    </script>
</body>
</html>
